# =============================================================================
# Nginx 反向代理配置 — AliceJump Profile README 自部署服务
# =============================================================================
# 使用方法:
#   1. 将本文件放入 /etc/nginx/sites-available/
#   2. 替换 YOUR_DOMAIN 为你的实际域名
#   3. 配置 SSL（建议 certbot）
#   4. ln -s /etc/nginx/sites-available/alicejump.conf /etc/nginx/sites-enabled/
#   5. nginx -t && systemctl reload nginx
# =============================================================================

# HTTP → HTTPS 重定向
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com;

    # SSL 配置 (使用 certbot 自动生成)
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # -------------------------------------------------------------------------
    # 1. Readme Typing SVG — https://your-domain.com/typing-svg/
    # -------------------------------------------------------------------------
    location /typing-svg/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SVG 缓存 (1 小时)
        location ~* \.svg$ {
            proxy_pass http://127.0.0.1:8081;
            add_header Cache-Control "public, max-age=3600";
        }
    }

    # -------------------------------------------------------------------------
    # 2. GitHub Profile Views Counter — https://your-domain.com/ghpvc/
    # -------------------------------------------------------------------------
    location /ghpvc/ {
        proxy_pass http://127.0.0.1:8082/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------------------------
    # 3. Shields.io Badges — https://your-domain.com/badge/
    # -------------------------------------------------------------------------
    location /badge/ {
        proxy_pass http://127.0.0.1:8083/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Badge 缓存 (5 分钟)
        add_header Cache-Control "public, max-age=300";
    }

    # -------------------------------------------------------------------------
    # 4. GitHub Readme Streak Stats — https://your-domain.com/streak/
    # -------------------------------------------------------------------------
    location /streak/ {
        proxy_pass http://127.0.0.1:8084/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SVG 缓存 (1 小时)
        location ~* \.svg$ {
            proxy_pass http://127.0.0.1:8084;
            add_header Cache-Control "public, max-age=3600";
        }
    }

    # -------------------------------------------------------------------------
    # 5. 静态资源（GitHub Actions 生成的 SVGs）
    #    用于 Profile Summary Cards 和 GitHub Stats
    # -------------------------------------------------------------------------
    location /static/ {
        alias /var/www/alicejump-static/;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # 根路径
    location / {
        return 404;
    }
}
